
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, sans-serif; }
.shell { display: flex; flex-direction: column; height: 760px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: #F0F2F5; }

.hdr { height: 56px; background: #1A3C6E; display: flex; align-items: center; padding: 0 24px; flex-shrink: 0; border-bottom: 3px solid #4A90D9; }
.hdr-logo { display: flex; align-items: center; gap: 8px; flex: 1; }
.hdr-logo i { color: #fff; font-size: 20px; }
.hdr-logo span { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.hdr-btn { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
.hdr-btn i { color: rgba(255,255,255,0.85); font-size: 17px; }
.notif-dot { position: absolute; top: 5px; right: 5px; width: 7px; height: 7px; background: #ef4444; border-radius: 50%; border: 1.5px solid #1A3C6E; }
.av { width: 32px; height: 32px; border-radius: 50%; background: #4A90D9; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 600; }
.hdr-name { color: #fff; font-size: 13px; font-weight: 500; line-height: 1.2; }
.hdr-role { color: rgba(255,255,255,0.55); font-size: 11px; }

.body { display: flex; flex: 1; overflow: hidden; }

.sidebar { width: 220px; background: #1A3C6E; display: flex; flex-direction: column; flex-shrink: 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; font-size: 13px; color: rgba(255,255,255,0.7); cursor: pointer; position: relative; }
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: #2d5aa0; color: #fff; font-weight: 500; }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #fff; }
.nav-item i { font-size: 17px; flex-shrink: 0; }
.sidebar-bot { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.12); padding: 8px 0; }

.main { flex: 1; overflow-y: auto; padding: 24px 32px; }

.back-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; cursor: pointer; }
.back-row i { font-size: 18px; color: #1A3C6E; }
.back-row span { font-size: 15px; font-weight: 700; color: var(--color-text-primary); }

.form-card { background: #fff; border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); padding: 24px; max-width: 680px; display: flex; flex-direction: column; gap: 20px; }

.auto-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.auto-box { background: #F8F9FC; border: 0.5px solid var(--color-border-tertiary); border-radius: 8px; padding: 10px 14px; }
.auto-label { font-size: 10px; font-weight: 600; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.auto-label i { font-size: 13px; color: var(--color-text-tertiary); }
.auto-value { font-size: 14px; font-weight: 700; color: #1A3C6E; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); letter-spacing: 0.05em; text-transform: uppercase; }
.field-select { height: 40px; border: 1px solid #d1d5db; border-radius: 8px; padding: 0 12px; font-size: 13px; color: var(--color-text-primary); background: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.field-select i { font-size: 16px; color: var(--color-text-tertiary); }
.field-input { height: 40px; border: 1px solid #d1d5db; border-radius: 8px; padding: 0 12px; font-size: 13px; color: var(--color-text-primary); background: #fff; display: flex; align-items: center; justify-content: space-between; }
.field-input i { font-size: 16px; color: var(--color-text-tertiary); }

.chem-section { display: flex; flex-direction: column; gap: 10px; }
.chem-header { display: flex; align-items: center; justify-content: space-between; }
.chem-title { font-size: 14px; font-weight: 600; color: var(--color-text-primary); display: flex; align-items: center; gap: 7px; }
.chem-title i { font-size: 17px; color: #1A3C6E; }
.add-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: #1A3C6E; color: #fff; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; }
.add-btn i { font-size: 14px; }

.chem-cols { display: grid; grid-template-columns: 1fr 140px 36px; gap: 8px; align-items: center; }
.col-label { font-size: 10px; font-weight: 600; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; }

.chem-row-input { display: grid; grid-template-columns: 1fr 140px 36px; gap: 8px; align-items: center; }
.select-chem { height: 38px; border: 1px solid #d1d5db; border-radius: 7px; padding: 0 10px; font-size: 13px; color: var(--color-text-tertiary); background: #fff; display: flex; align-items: center; justify-content: space-between; }
.select-chem i { font-size: 15px; color: var(--color-text-tertiary); }
.qty-wrap { height: 38px; border: 1px solid #d1d5db; border-radius: 7px; display: flex; align-items: center; overflow: hidden; }
.qty-input { flex: 1; border: none; padding: 0 10px; font-size: 13px; color: var(--color-text-primary); background: transparent; outline: none; }
.qty-unit { padding: 0 8px; font-size: 12px; color: var(--color-text-tertiary); border-left: 1px solid #e5e7eb; height: 100%; display: flex; align-items: center; }
.del-btn { width: 36px; height: 36px; border-radius: 7px; background: #FEF2F2; border: 1px solid #FECACA; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.del-btn i { font-size: 16px; color: #EF4444; }

.remarks-label { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
.remarks-box { border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px; height: 80px; font-size: 13px; color: var(--color-text-tertiary); display: flex; align-items: flex-start; }

.action-row { display: flex; gap: 10px; padding-top: 4px; }
.btn { height: 42px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 0 20px; border: none; }
.btn-ghost { background: #fff; border: 1.5px solid #d1d5db; color: var(--color-text-secondary); }
.btn-draft { background: #fff; border: 1.5px solid #1A3C6E; color: #1A3C6E; }
.btn-submit { background: #1A3C6E; color: #fff; padding: 0 28px; }
.btn-submit i { font-size: 16px; }
.spacer { flex: 1; }
</style>

<div class="shell">
  <div class="hdr">
    <div class="hdr-logo">
      <i class="ti ti-flask" aria-hidden="true"></i>
      <span>LMS</span>
    </div>
    <div class="hdr-right">
      <div class="hdr-btn">
        <i class="ti ti-bell" aria-hidden="true"></i>
        <div class="notif-dot"></div>
      </div>
      <div class="hdr-btn"><i class="ti ti-moon" aria-hidden="true"></i></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="av">ST</div>
        <div>
          <div class="hdr-name">Staff</div>
          <div class="hdr-role">Store Department</div>
        </div>
      </div>
    </div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div style="padding-top:8px;">
        <div class="nav-item"><i class="ti ti-packages" aria-hidden="true"></i>Inventory</div>
        <div class="nav-item active"><i class="ti ti-file-text" aria-hidden="true"></i>Chemical Request</div>
        <div class="nav-item"><i class="ti ti-pencil" aria-hidden="true"></i>My Draft</div>
      </div>
      <div class="sidebar-bot">
        <div class="nav-item"><i class="ti ti-settings" aria-hidden="true"></i>Settings</div>
        <div class="nav-item"><i class="ti ti-logout" aria-hidden="true"></i>Logout</div>
      </div>
    </div>

    <div class="main">
      <div class="back-row">
        <i class="ti ti-arrow-left" aria-hidden="true"></i>
        <span>New Request</span>
      </div>

      <div class="form-card">

        <div class="auto-row">
          <div class="auto-box">
            <div class="auto-label"><i class="ti ti-lock" aria-hidden="true"></i>ID</div>
            <div class="auto-value">AUTO</div>
          </div>
          <div class="auto-box">
            <div class="auto-label"><i class="ti ti-lock" aria-hidden="true"></i>STAFF</div>
            <div class="auto-value">Test Staff</div>
          </div>
        </div>

        <div class="field">
          <div class="field-label">Class</div>
          <div class="field-select">
            <span style="font-size:13px;color:var(--color-text-primary);">I B.Sc Chemistry</span>
            <i class="ti ti-chevron-down" aria-hidden="true"></i>
          </div>
        </div>

        <div class="field">
          <div class="field-label">Date</div>
          <div class="field-input">
            <span style="font-size:13px;color:var(--color-text-primary);">25-04-2026</span>
            <i class="ti ti-calendar" aria-hidden="true"></i>
          </div>
        </div>

        <div class="chem-section">
          <div class="chem-header">
            <div class="chem-title">
              <i class="ti ti-flask" aria-hidden="true"></i>Chemical Requirements
            </div>
            <div class="add-btn"><i class="ti ti-plus" aria-hidden="true"></i>Add Line</div>
          </div>

          <div class="chem-cols" style="padding: 0 2px;">
            <span class="col-label">Chemical</span>
            <span class="col-label">QTY (ML)</span>
            <span></span>
          </div>

          <div class="chem-row-input">
            <div class="select-chem">
              <span>Select chemicals</span>
              <i class="ti ti-chevron-down" aria-hidden="true"></i>
            </div>
            <div class="qty-wrap">
              <input class="qty-input" value="0" type="text" />
              <span class="qty-unit">ml</span>
            </div>
            <div class="del-btn"><i class="ti ti-trash" aria-hidden="true"></i></div>
          </div>

          <div class="chem-row-input">
            <div class="select-chem">
              <span>Select chemicals</span>
              <i class="ti ti-chevron-down" aria-hidden="true"></i>
            </div>
            <div class="qty-wrap">
              <input class="qty-input" value="0" type="text" />
              <span class="qty-unit">ml</span>
            </div>
            <div class="del-btn"><i class="ti ti-trash" aria-hidden="true"></i></div>
          </div>
        </div>

        <div>
          <div class="remarks-label">Purpose / Remarks <span style="font-size:11px;font-weight:400;color:var(--color-text-tertiary);text-transform:none;letter-spacing:0;">(Optional)</span></div>
          <div class="remarks-box">Details...</div>
        </div>

        <div class="action-row">
          <button class="btn btn-ghost">Cancel</button>
          <div class="spacer"></div>
          <button class="btn btn-draft">Draft</button>
          <button class="btn btn-submit">Submit <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
        </div>

      </div>
    </div>
  </div>
</div>
